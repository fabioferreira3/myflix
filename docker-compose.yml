services:
    laravel.test:
        # build:
        #     context: ./docker/8.4
        #     dockerfile: Dockerfile
        #     args:
        #         WWWGROUP: '${WWWGROUP}'
        container_name: myflix-app
        image: sail-8.4/app
        extra_hosts:
            - 'host.docker.internal:host-gateway'
        ports:
            - '9000:80'
            - '${VITE_PORT:-6173}:6173'
        environment:
            WWWUSER: '${WWWUSER}'
            LARAVEL_SAIL: 1
            XDEBUG_MODE: '${SAIL_XDEBUG_MODE:-off}'
            XDEBUG_CONFIG: '${SAIL_XDEBUG_CONFIG:-client_host=host.docker.internal}'
            IGNITION_LOCAL_SITES_PATH: '${PWD}'
        volumes:
            - '.:/var/www/html'
            - '/mnt/brutus:/var/www/html/storage/app/public/nas'
            - "./docker/supervisord.conf:/etc/supervisor/conf.d/supervisord.conf"
        networks:
            baron_network:
                ipv4_address: 172.18.3.0
                aliases:
                  - baron.myflix.app
        depends_on:
            - meilisearch
            - redis
        restart: unless-stopped
    meilisearch:
        image: 'getmeili/meilisearch:latest'
        container_name: myflix-meilisearch
        ports:
            - '${FORWARD_MEILISEARCH_PORT:-7701}:7700'
        environment:
            MEILI_NO_ANALYTICS: '${MEILISEARCH_NO_ANALYTICS:-false}'
        volumes:
            - 'sail-meilisearch:/meili_data'
        networks:
            baron_network:
                ipv4_address: 172.18.3.1
                aliases:
                  - baron.myflix.meilisearch
        healthcheck:
            test:
                - CMD
                - wget
                - '--no-verbose'
                - '--spider'
                - 'http://127.0.0.1:7700/health'
            retries: 3
            timeout: 5s
        restart: unless-stopped
    redis:
        container_name: myflix-redis
        image: "redis:alpine"
        ports:
            - "${FORWARD_REDIS_PORT:-6380}:6379"
        volumes:
            - "sail-redis:/data"
        networks:
            baron_network:
                ipv4_address: 172.18.3.2
                aliases:
                  - baron.myflix.redis
        healthcheck:
            test: ["CMD", "redis-cli", "ping"]
            retries: 3
            timeout: 5s
        restart: unless-stopped
    # whisper-api now runs directly on host OS with GPU support
    # To start: sudo systemctl start whisper-api
    # To enable on boot: sudo systemctl enable whisper-api
    # whisper-api:
    #     build: ./whisper-api
    #     container_name: whisper-api
    #     volumes:
    #         - ./audio:/app/audio
    #         - /mnt/brutus/jw:/app/jw
    #     environment:
    #         - MODEL=medium
    #     ports:
    #         - "5002:5000"
    #     networks:
    #         baron_network:
    #             ipv4_address: 172.18.3.3
    #             aliases:
    #               - baron.myflix.whisper
    #     restart: unless-stopped
networks:
    baron_network:
        external: true
        driver: bridge
volumes:
    sail-meilisearch:
        driver: local
    sail-redis:
        driver: local
